name: Render Free Warmup

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping free Render services
        run: |
          set -euo pipefail

          urls=(
            "https://studentflow-rbog.onrender.com/health"
            "https://pockettrade-ebaq.onrender.com/health"
          )

          for url in "${urls[@]}"; do
            echo "Pinging ${url}"

            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 4 \
              --retry-delay 10 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 120 \
              "$url" >/dev/null; then
              echo "Healthy: ${url}"
            else
              echo "::warning::Render service did not respond after retries: ${url}"
            fi
          done
